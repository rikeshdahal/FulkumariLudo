<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fulkumari Ludo - Coming Soon</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f5e6b3;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Main Card */
.container {
    width: 350px;
    background: #fff4c7;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    overflow: hidden;
    text-align: center;
    border: 4px solid #e0b100;
}

/* Header */
.header {
    background: #1f4ed8;
    color: white;
    padding: 15px;
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 2px;
}

/* Title */
.title {
    font-size: 28px;
    font-weight: bold;
    margin: 20px 0 10px;
    color: #333;
}

/* Subtitle */
.subtitle {
    color: #666;
    margin-bottom: 20px;
}

/* Dice Loader */
.dice {
    width: 70px;
    height: 70px;
    margin: 20px auto;
    background: white;
    border-radius: 15px;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
    position: relative;
    animation: roll 1.2s infinite;
}

@keyframes roll {
    0% { transform: rotate(0deg); }
    50% { transform: rotate(180deg) scale(1.1); }
    100% { transform: rotate(360deg); }
}

/* Dots */
.dot {
    width: 10px;
    height: 10px;
    background: #333;
    border-radius: 50%;
    position: absolute;
}

.dot:nth-child(1) { top: 10px; left: 10px; }
.dot:nth-child(2) { top: 10px; right: 10px; }
.dot:nth-child(3) { top: 30px; left: 30px; }
.dot:nth-child(4) { bottom: 10px; left: 10px; }
.dot:nth-child(5) { bottom: 10px; right: 10px; }

/* Button */
.btn {
    background: #22c55e;
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    margin: 20px 0;
    transition: 0.3s;
}

.btn:hover {
    background: #16a34a;
    transform: scale(1.05);
}

/* Footer */
.footer {
    font-size: 12px;
    color: #777;
    margin-bottom: 15px;
}

</style>
</head>

<body>

<div class="container">

    <div class="header">
        🎲 LUDO FULKUMARI
    </div>

    <div class="title">
        Coming Soon 🚀
    </div>

    <div class="subtitle">
        We're building something awesome for you!
    </div>

    <div class="dice">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <button class="btn">
        Notify Me
    </button>

    <div class="footer">
        © 2026 Rikesh Dahal
    </div>

</div>

</body>
</html>
