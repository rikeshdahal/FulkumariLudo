<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUDO 🎲 Fulkumari — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1a6fe8;--yellow:#e8c200;--yellow-l:#ffe566;
  --red:#e02020;--green:#1ca84a;--green-d:#0d6b2e;
  --bg:#0a0a18;--card:#f5e9c8;--border:#d4a800;
  --dice-speed:1.4s;
}
body{
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 70% 70% at 15% 15%,rgba(26,111,232,.2) 0%,transparent 60%),
    radial-gradient(ellipse 70% 70% at 85% 85%,rgba(28,168,74,.15) 0%,transparent 60%),
    radial-gradient(ellipse 50% 50% at 50% 50%,rgba(139,43,226,.1) 0%,transparent 65%);
  min-height:100vh;
  display:flex;justify-content:center;align-items:center;
  font-family:'Nunito',sans-serif;
  overflow-x:hidden;padding:20px;
}
.card{
  width:360px;background:var(--card);
  border:4px solid var(--border);border-radius:20px;overflow:hidden;
  box-shadow:0 16px 60px rgba(0,0,0,.75),0 0 0 2px rgba(255,220,80,.25);
  animation:fadeUp .6s cubic-bezier(.22,1,.36,1) both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.header{
  background:linear-gradient(160deg,#1a4fc0,#0e38a8);
  padding:14px 16px 10px;border-bottom:3px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.logo-text{display:flex;align-items:center;line-height:1}
.logo-L{font-family:'Fredoka One',cursive;font-size:2.2rem;color:#e02020;text-shadow:0 2px 0 #7a0000,0 0 14px rgba(224,32,32,.5);-webkit-text-stroke:1px #7a0000}
.logo-U{font-family:'Fredoka One',cursive;font-size:2.2rem;color:#1ca84a;text-shadow:0 2px 0 #0a5a20,0 0 14px rgba(28,168,74,.5);-webkit-text-stroke:1px #0a5a20}
.logo-D{font-family:'Fredoka One',cursive;font-size:2.2rem;color:#e8c200;text-shadow:0 2px 0 #7a6400,0 0 14px rgba(232,194,0,.5);-webkit-text-stroke:1px #7a6400}
.logo-O{font-family:'Fredoka One',cursive;font-size:2.2rem;color:#1a6fe8;text-shadow:0 2px 0 #0d4aaa,0 0 14px rgba(26,111,232,.5);-webkit-text-stroke:1px #0d4aaa}
.logo-dice{font-size:1.5rem;margin-left:5px;display:inline-block;animation:wiggle 2s ease-in-out infinite}
@keyframes wiggle{0%,100%{transform:rotate(-10deg)}50%{transform:rotate(10deg)}}
.logo-sub{font-size:.58rem;color:rgba(255,255,255,.5);letter-spacing:3px;text-transform:uppercase;font-weight:800;margin-top:2px}
.header-badge{background:rgba(232,194,0,.15);border:1.5px solid rgba(232,194,0,.4);border-radius:20px;padding:4px 12px;font-family:'Fredoka One',cursive;font-size:.65rem;color:#ffe566;letter-spacing:2px}
.body{padding:20px 18px}
.coming-title{font-family:'Fredoka One',cursive;font-size:1.9rem;color:#2a1400;letter-spacing:1px;text-align:center;margin-bottom:4px}
.coming-sub{font-size:.82rem;color:#7a4a00;font-weight:700;text-align:center;margin-bottom:18px}
.countdown{display:flex;gap:8px;justify-content:center;margin-bottom:18px}
.cd-box{flex:1;background:linear-gradient(160deg,#1a4fc0,#0e38a8);border:2px solid var(--border);border-radius:12px;padding:10px 4px 6px;text-align:center;box-shadow:0 4px 0 #0a2060}
.cd-num{font-family:'Fredoka One',cursive;font-size:1.6rem;color:#ffe566;line-height:1;display:block}
.cd-label{font-size:.55rem;color:rgba(255,255,255,.5);letter-spacing:2px;text-transform:uppercase;font-weight:800}

/* ── DICE ── */
.dice-area{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:18px}
.dice-hint{font-size:.72rem;color:#a87000;font-weight:800;letter-spacing:1px}

.dice-wrap{
  cursor:pointer;user-select:none;
  display:flex;align-items:center;justify-content:center;
  width:130px;height:130px;
}
.dice-scene{
  width:100px;height:100px;
  perspective:500px;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}
.dice-cube{
  width:76px;height:76px;
  position:relative;
  transform-style:preserve-3d;
  transform:rotateX(-28deg) rotateY(38deg);
  transition:transform var(--dice-speed) cubic-bezier(.15,.9,.25,1.1);
  filter:drop-shadow(2px 6px 14px rgba(0,0,0,.55));
}
.dice-face{
  position:absolute;
  width:76px;height:76px;
  border-radius:13px;
  backface-visibility:hidden;
  display:flex;align-items:center;justify-content:center;
}
.dice-face svg{width:58px;height:58px}
/* Different brightness per face = visible 3D cube */
.df1{transform:rotateY(  0deg) translateZ(38px);background:#ffffff;box-shadow:inset 0 2px 8px rgba(255,255,255,1),inset 0 -2px 4px rgba(0,0,0,.06)}
.df6{transform:rotateY(180deg) translateZ(38px);background:#c8c8c8;box-shadow:inset 0 2px 4px rgba(255,255,255,.4),inset 0 -2px 4px rgba(0,0,0,.2)}
.df2{transform:rotateX( 90deg) translateZ(38px);background:#e4e4e4;box-shadow:inset 0 2px 5px rgba(255,255,255,.7),inset 0 -2px 4px rgba(0,0,0,.1)}
.df5{transform:rotateX(-90deg) translateZ(38px);background:#d8d8d8;box-shadow:inset 0 2px 5px rgba(255,255,255,.5),inset 0 -2px 4px rgba(0,0,0,.15)}
.df3{transform:rotateY( 90deg) translateZ(38px);background:#dddddd;box-shadow:inset 0 2px 5px rgba(255,255,255,.55),inset 0 -2px 4px rgba(0,0,0,.12)}
.df4{transform:rotateY(-90deg) translateZ(38px);background:#d0d0d0;box-shadow:inset 0 2px 5px rgba(255,255,255,.5),inset 0 -2px 4px rgba(0,0,0,.14)}

.dice-result{
  font-family:'Fredoka One',cursive;font-size:1.3rem;min-height:30px;
  color:#1a4fc0;text-align:center;letter-spacing:1px;
  transition:opacity .25s,transform .35s cubic-bezier(.34,1.56,.64,1);
}
/* coins */
.colors-row{display:flex;gap:6px;justify-content:center;margin-bottom:18px}
.c-dot{width:28px;height:28px;border-radius:50%;border:2.5px solid rgba(0,0,0,.15);box-shadow:0 3px 8px rgba(0,0,0,.25);animation:floatY 3s ease-in-out infinite}
.c-dot:nth-child(1){background:radial-gradient(circle at 35% 30%,#fff176,#e8c200 60%,#8a7000);animation-delay:0s}
.c-dot:nth-child(2){background:radial-gradient(circle at 35% 30%,#ff8888,#e02020 60%,#9a0000);animation-delay:.3s}
.c-dot:nth-child(3){background:radial-gradient(circle at 35% 30%,#8dff9a,#1ca84a 60%,#0d6b2e);animation-delay:.6s}
.c-dot:nth-child(4){background:radial-gradient(circle at 35% 30%,#7bbfff,#1a6fe8 60%,#0d4aaa);animation-delay:.9s}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

.features{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:16px}
.feat{background:rgba(255,255,255,.45);border:1.5px solid rgba(212,168,0,.4);border-radius:10px;padding:8px 10px;display:flex;align-items:center;gap:7px}
.feat-icon{font-size:1.1rem;flex-shrink:0}
.feat-text{font-size:.7rem;font-weight:800;color:#4a2800;line-height:1.3}
.form-label{font-family:'Fredoka One',cursive;font-size:.8rem;color:#7a4a00;letter-spacing:1px;display:block;margin-bottom:6px}
.input-row{display:flex;gap:8px;margin-bottom:8px}
.email-input{flex:1;padding:11px 14px;border:2.5px solid var(--border);border-radius:12px;background:rgba(255,255,255,.65);font-family:'Nunito',sans-serif;font-size:.88rem;color:#2a1400;outline:none;transition:border-color .2s,box-shadow .2s}
.email-input:focus{border-color:#1a6fe8;box-shadow:0 0 0 3px rgba(26,111,232,.15)}
.email-input:disabled{opacity:.6;cursor:not-allowed}
.email-input::placeholder{color:#b8900080}
.notify-btn{
  padding:11px 16px;border-radius:12px;border:2px solid #085820;
  background:linear-gradient(160deg,#2aba50,#0d7a30);color:#fff;
  font-family:'Fredoka One',cursive;font-size:.95rem;letter-spacing:1px;
  cursor:pointer;box-shadow:0 4px 0 #085820;
  transition:transform .12s,box-shadow .12s;white-space:nowrap;min-width:110px;
  position:relative;overflow:hidden;
}
.notify-btn::after{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:linear-gradient(180deg,rgba(255,255,255,.2),transparent);pointer-events:none;border-radius:10px 10px 0 0}
.notify-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 0 #085820}
.notify-btn:active:not(:disabled){transform:translateY(1px);box-shadow:0 2px 0 #085820}
.notify-btn:disabled{opacity:.7;cursor:not-allowed;transform:none}
.status-msg{font-family:'Fredoka One',cursive;font-size:.78rem;min-height:20px;text-align:center;letter-spacing:.5px;transition:all .3s}
.status-msg.success{color:#0d6b2e}.status-msg.error{color:#c01010}.status-msg.loading{color:#1a4fc0}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}
.card-footer{background:#f0d880;border-top:2px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.footer-copy{font-size:.65rem;color:#7a5a00;font-weight:800}
.footer-share{display:flex;gap:6px;align-items:center}
.share-btn{width:30px;height:30px;border-radius:50%;border:1.5px solid rgba(212,168,0,.5);background:rgba(255,255,255,.5);font-size:.78rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;color:#5a3800}
.share-btn:hover{background:rgba(255,255,255,.85);transform:scale(1.12)}
.sub-badge{height:30px;padding:0 10px;border-radius:20px;border:1.5px solid rgba(26,111,232,.35);background:rgba(26,111,232,.1);font-family:'Fredoka One',cursive;font-size:.62rem;color:#1a4fc0;display:flex;align-items:center}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div>
      <div class="logo-text">
        <span class="logo-L">L</span><span class="logo-U">U</span><span class="logo-D">D</span><span class="logo-O">O</span>
        <span class="logo-dice">🎲</span>
      </div>
      <div class="logo-sub">Fulkumari Multiplayer</div>
    </div>
    <div class="header-badge">COMING SOON</div>
  </div>

  <div class="body">
    <div class="coming-title">We're almost ready! 🚀</div>
    <div class="coming-sub">Real-time Online Ludo · Up to 4 Players</div>

    <div class="countdown">
      <div class="cd-box"><span class="cd-num" id="cd-days">30</span><span class="cd-label">Days</span></div>
      <div class="cd-box"><span class="cd-num" id="cd-hours">00</span><span class="cd-label">Hours</span></div>
      <div class="cd-box"><span class="cd-num" id="cd-mins">00</span><span class="cd-label">Mins</span></div>
      <div class="cd-box"><span class="cd-num" id="cd-secs">00</span><span class="cd-label">Secs</span></div>
    </div>

    <div class="dice-area">
      <div class="dice-hint">🎲 TAP THE DICE TO ROLL!</div>

      <div class="dice-wrap" id="dice-wrap" onclick="rollDice()">
        <div class="dice-scene">
          <div class="dice-cube" id="dice-cube">
            <div class="dice-face df1">
              <svg viewBox="0 0 68 68"><circle cx="34" cy="34" r="9" fill="#222"/></svg>
            </div>
            <div class="dice-face df6">
              <svg viewBox="0 0 68 68">
                <circle cx="19" cy="13" r="8" fill="#222"/><circle cx="49" cy="13" r="8" fill="#222"/>
                <circle cx="19" cy="34" r="8" fill="#222"/><circle cx="49" cy="34" r="8" fill="#222"/>
                <circle cx="19" cy="55" r="8" fill="#222"/><circle cx="49" cy="55" r="8" fill="#222"/>
              </svg>
            </div>
            <div class="dice-face df2">
              <svg viewBox="0 0 68 68">
                <circle cx="49" cy="19" r="8" fill="#222"/><circle cx="19" cy="49" r="8" fill="#222"/>
              </svg>
            </div>
            <div class="dice-face df5">
              <svg viewBox="0 0 68 68">
                <circle cx="19" cy="19" r="8" fill="#222"/><circle cx="49" cy="19" r="8" fill="#222"/>
                <circle cx="34" cy="34" r="8" fill="#222"/>
                <circle cx="19" cy="49" r="8" fill="#222"/><circle cx="49" cy="49" r="8" fill="#222"/>
              </svg>
            </div>
            <div class="dice-face df3">
              <svg viewBox="0 0 68 68">
                <circle cx="49" cy="19" r="8" fill="#222"/>
                <circle cx="34" cy="34" r="8" fill="#222"/>
                <circle cx="19" cy="49" r="8" fill="#222"/>
              </svg>
            </div>
            <div class="dice-face df4">
              <svg viewBox="0 0 68 68">
                <circle cx="19" cy="19" r="8" fill="#222"/><circle cx="49" cy="19" r="8" fill="#222"/>
                <circle cx="19" cy="49" r="8" fill="#222"/><circle cx="49" cy="49" r="8" fill="#222"/>
              </svg>
            </div>
          </div>
        </div>
      </div>

      <div class="dice-result" id="dice-result">Tap dice to roll! 🎲</div>

      <div class="colors-row">
        <div class="c-dot"></div><div class="c-dot"></div>
        <div class="c-dot"></div><div class="c-dot"></div>
      </div>
    </div>

    <div class="features">
      <div class="feat"><span class="feat-icon">🌐</span><span class="feat-text">Real-time Multiplayer</span></div>
      <div class="feat"><span class="feat-icon">🤖</span><span class="feat-text">Smart AI Bots</span></div>
      <div class="feat"><span class="feat-icon">🏆</span><span class="feat-text">ELO Rating System</span></div>
      <div class="feat"><span class="feat-icon">🎮</span><span class="feat-text">Up to 4 Players</span></div>
    </div>

    <label class="form-label">Launch हुँदा notify गर्नुस्:</label>
    <div class="input-row">
      <input type="email" id="emailInput" class="email-input" placeholder="Enter your email…">
      <button class="notify-btn" id="notifyBtn" onclick="submitEmail()">Notify Me</button>
    </div>
    <div class="status-msg" id="statusMsg"></div>
  </div>

  <div class="card-footer">
    <div class="footer-copy">© 2026 Rikesh Dahal</div>
    <div class="footer-share">
      <span class="sub-badge" id="subBadge">✉ 0 joined</span>
      <button class="share-btn" onclick="shareGame()" title="Share">🔗</button>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzAwtHrIXqpYSIhWUI80-YHSCwKMfuIql-t09ai6PJUel0ixS1dH51z06JlV-vARYYc/exec';

/* Countdown */
const TARGET = new Date(Date.now() + 30*24*60*60*1000);
function tick(){
  const diff = Math.max(0, TARGET - Date.now());
  document.getElementById('cd-days').textContent  = String(Math.floor(diff/86400000)).padStart(2,'0');
  document.getElementById('cd-hours').textContent = String(Math.floor(diff%86400000/3600000)).padStart(2,'0');
  document.getElementById('cd-mins').textContent  = String(Math.floor(diff%3600000/60000)).padStart(2,'0');
  document.getElementById('cd-secs').textContent  = String(Math.floor(diff%60000/1000)).padStart(2,'0');
}
tick(); setInterval(tick,1000);

/* 3D Dice */
let xRot=-28, yRot=38, rolling=false;
// face rotation targets to show correct face after roll
const faceMap={1:[0,0],2:[-90,0],3:[0,-90],4:[0,90],5:[90,0],6:[0,180]};
const msgs={
  1:['1 — Hard luck! 😅','1 — Try again! 🎲'],
  2:['2 — Not bad! 😊','2 — Keep going! 💪'],
  3:['3 — Getting there! 🙂','3 — Almost! 😏'],
  4:['4 — Nice roll! 😎','4 — Good one! 🎯'],
  5:['5 — Great roll! 🔥','5 — So close! 🎉'],
  6:['SIX! JACKPOT! 🎊🎊','6 — AMAZING! 🏆🎲','SIX! Lucky you! ⭐⭐']
};
const clrs={1:'#c01010',2:'#a87000',3:'#5a3800',4:'#0d6b2e',5:'#1a4fc0',6:'#7c3aed'};

const wrap = document.getElementById('dice-wrap');
const cube = document.getElementById('dice-cube');

/* Hover — scale using JS so it never fights with CSS transform */
wrap.addEventListener('mouseenter', () => {
  if(!rolling) cube.style.filter = 'drop-shadow(2px 8px 20px rgba(26,111,232,.5)) brightness(1.06)';
});
wrap.addEventListener('mouseleave', () => {
  cube.style.filter = 'drop-shadow(2px 6px 14px rgba(0,0,0,.55))';
});

function rollDice(){
  if(rolling) return;
  rolling=true;
  wrap.style.pointerEvents='none';
  const res = document.getElementById('dice-result');
  const val = 1+Math.floor(Math.random()*6);
  const [tx,ty] = faceMap[val];
  // spin 4 full rotations + land on correct face
  xRot += 1440 + tx - (xRot%360 < 0 ? xRot%360+360 : xRot%360);
  yRot += 1440 + ty - (yRot%360 < 0 ? yRot%360+360 : yRot%360);
  cube.style.transform = `rotateX(${xRot}deg) rotateY(${yRot}deg)`;
  res.style.opacity='0';
  res.style.transform='scale(.5)';
  setTimeout(()=>{
    const opts=msgs[val];
    res.style.color=clrs[val];
    res.textContent=opts[Math.floor(Math.random()*opts.length)];
    res.style.opacity='1';
    res.style.transform='scale(1)';
    cube.style.filter='drop-shadow(2px 6px 14px rgba(0,0,0,.55))';
    wrap.style.pointerEvents='';
    rolling=false;
  },1500);
}

/* Email */
const SENT_KEY='fk_sent', CNT_KEY='fk_cnt';
function getSent(){try{return JSON.parse(localStorage.getItem(SENT_KEY)||'[]');}catch(e){return[];}}
function getCount(){return parseInt(localStorage.getItem(CNT_KEY)||'0');}
function setCount(n){localStorage.setItem(CNT_KEY,n);document.getElementById('subBadge').textContent='✉ '+n+' joined';}
setCount(getCount());

function msg(txt,type){
  const el=document.getElementById('statusMsg');
  el.textContent=txt;el.className='status-msg '+type;
  if(type==='success')setTimeout(()=>{el.textContent='';el.className='status-msg';},4000);
}
function setLoading(on){
  const btn=document.getElementById('notifyBtn'),inp=document.getElementById('emailInput');
  btn.disabled=inp.disabled=on;
  btn.innerHTML=on?'<span class="spinner"></span>Saving…':'Notify Me';
}
async function submitEmail(){
  const inp=document.getElementById('emailInput');
  const email=inp.value.trim();
  if(!email){msg('Email हाल्नुस्!','error');return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){msg('Valid email हाल्नुस्!','error');return;}
  if(getSent().includes(email.toLowerCase())){msg('Already saved! ✅','loading');return;}
  setLoading(true);msg('Saving…','loading');
  try{
    await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
    inp.value='';
    const s=getSent();s.push(email.toLowerCase());localStorage.setItem(SENT_KEY,JSON.stringify(s));
    setCount(getCount()+1);
    msg('✅ Saved! Launch हुँदा notify गर्छौं! 🎉','success');
  }catch(e){msg('❌ Retry गर्नुस्!','error');}
  finally{setLoading(false);}
}
document.getElementById('emailInput').addEventListener('keydown',e=>{if(e.key==='Enter')submitEmail();});

function shareGame(){
  if(navigator.share)navigator.share({title:'Ludo Fulkumari',text:'Real-time Multiplayer Ludo — Coming Soon! 🎲',url:window.location.href});
  else navigator.clipboard.writeText(window.location.href).then(()=>msg('Link copied! 🔗','success'));
}
</script>
</body>
</html>
